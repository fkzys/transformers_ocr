name: CI

on:
  push:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Makefile'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Makefile'
      - '.github/workflows/ci.yml'

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - run: pip install pytest pytest-timeout
      - run: make test-unit

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - run: pip install pytest pytest-timeout
      - name: Install X11 and SDL2 dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb \
            libx11-6 \
            libsdl2-2.0-0 \
            libsdl2-image-2.0-0 \
            libdbus-1-3
      - run: make test-xvfb
